  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --bg-base: #000000;
      --bg-surface: #121212;
      --bg-surface-light: #1e1e24;
      --primary: #00c6ff;
      --text-main: #ffffff;
      --text-muted: #8a8a93;
      --danger: #ff4757;
      --transition: 0.25s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-base);
      color: var(--text-main);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    ::-webkit-scrollbar { height: 4px; width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

    header {
      display: flex; align-items: center; justify-content: space-between; padding: 12px 20px;
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .header-left { display: flex; align-items: center; }
    .header-left img { height: 24px; margin-right: 10px; }
    .header-left h1 { font-size: 18px; font-weight: 700; margin: 0;}

    .lang-switcher {
        display: flex; background: rgba(255,255,255,0.1);
        border-radius: 20px; overflow: hidden; cursor: pointer;
    }
    .lang-btn {
        padding: 4px 12px; font-size: 0.8rem; font-weight: 700;
        color: var(--text-muted); transition: var(--transition); user-select: none;
    }
    .lang-btn.active { background: var(--primary); color: #000; }

    .filter-scroll-container {
      width: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(0,0,0,0.8), transparent);
      padding: 15px 20px 5px; position: sticky; top: 49px; z-index: 990;
    }

    .search-box { position: relative; margin-bottom: 12px; max-width: 1400px; margin-inline: auto; }
    .search-box input {
        width: 100%; padding: 10px 15px 10px 40px; border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.1); background: var(--bg-surface);
        color: white; font-family: inherit; font-size: 0.95rem; outline: none; transition: 0.3s;
    }
    .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,198,255,0.2); }
    .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

    .genre-pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; max-width: 1400px; margin-inline: auto; }
    .genre-pills::-webkit-scrollbar { display: none; }
    .pill-btn {
      background: var(--bg-surface); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; cursor: pointer;
      white-space: nowrap; transition: var(--transition); user-select: none; font-family: inherit;
    }
    .pill-btn:hover { background: var(--bg-surface-light); color: var(--text-main); }
    .pill-btn.active { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 700; box-shadow: 0 0 10px rgba(0,198,255,0.3); }

    main { padding: 10px 20px 40px; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; }

    .hero-slider-container {
        position: relative; width: 100%; height: 200px;
        border-radius: 12px; overflow: hidden; margin-bottom: 24px;
        display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.5); transition: opacity 0.3s;
    }
    @media(min-width: 768px) { .hero-slider-container { height: 350px; margin-bottom: 30px;} }
    .hero-slider { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
    .slide { min-width: 100%; position: relative; cursor: pointer; }
    .slide img { width: 100%; height: 100%; object-fit: cover; }
    .slide-overlay {
        position: absolute; bottom: 0; left: 0; right: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
        padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; height: 100%;
    }
    .slide-badge { background: var(--primary); color: #000; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; width: max-content; margin-bottom: 8px;}
    .slide-title { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 5px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); line-height: 1.2; }
    @media(min-width: 768px) { .slide-title { font-size: 2.2rem; margin-bottom: 10px;} }
    .slider-dots { position: absolute; bottom: 15px; right: 20px; display: flex; gap: 8px; }
    .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; cursor: pointer; transition: 0.3s; }
    .dot.active { background: var(--primary); transform: scale(1.4); }

    .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 30vh; color: var(--text-muted); }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #animeList { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 12px; }
    @media (min-width: 768px) { #animeList { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; } }

    .anime-card { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 2 / 3; cursor: pointer; background: var(--bg-surface); box-shadow: 0 4px 10px rgba(0,0,0,0.4); transition: var(--transition); }
    .anime-card:hover { transform: translateY(-4px) scale(1.03); z-index: 10; box-shadow: 0 8px 20px rgba(0,198,255,0.2);}
    .anime-card img.poster { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
    .anime-card:hover img.poster { filter: brightness(0.5); }

    .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, transparent 100%); padding: 15px 8px 8px; display: flex; flex-direction: column; justify-content: flex-end; height: 65%; pointer-events: none; }
    .episode-badge { position: absolute; top: 0; left: 0; background: var(--primary); color: #000; padding: 4px 8px; border-radius: 0 0 8px 0; font-size: 0.7rem; font-weight: 800; }
    .anime-title { font-size: 0.85rem; font-weight: 600; color: #fff; line-height: 1.2; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-shadow: 1px 1px 2px rgba(0,0,0,0.9); }
    .airing-time { font-size: 0.75rem; color: var(--primary); font-weight: 600; display: flex; align-items: center; gap: 4px; }

    .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(8px); opacity: 0; animation: fadeIn 0.2s forwards; }
    .modal-content { background: var(--bg-surface); margin: 5vh auto; width: 90%; max-width: 500px; max-height: 90vh; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; transform: translateY(20px); animation: slideUp 0.3s forwards cubic-bezier(0.25, 0.8, 0.25, 1); }
    @keyframes fadeIn { to { opacity: 1; } } @keyframes fadeOut { to { opacity: 0; } } @keyframes slideUp { to { transform: translateY(0); } } .modal.fade-out { animation: fadeOut 0.2s forwards; }
    
    .modal-banner { width: 100%; height: 160px; object-fit: cover; background: #1a1a1a; display: block; flex-shrink: 0; }
    .close { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: var(--transition); z-index: 10; }
    .close:hover { background: var(--danger); transform: rotate(90deg); }
    
    .modal-body { padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .modal-body::-webkit-scrollbar { width: 5px; }
    .modal-body::-webkit-scrollbar-track { background: transparent; }
    .modal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
    .modal-body::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    
    .modal-body h3 { font-size: 1.3rem; margin-bottom: 12px; color: #fff; line-height: 1.2;}
    .modal-details { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .detail-item { display: flex; flex-direction: column; gap: 4px; }
    .detail-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
    .detail-value { font-size: 0.9rem; font-weight: 500; color: #fff; }
    
    .platforms-container { display: flex; flex-wrap: wrap; gap: 8px; }
    .platforms-container a { display: inline-flex; align-items: center; background: #fff; padding: 4px; border-radius: 4px; transition: transform 0.2s; }
    .platforms-container a:hover { transform: scale(1.1); }
    .platforms-container img { height: 16px; object-fit: contain; filter: brightness(0); }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; margin-bottom: 15px; }
    .tag { background: rgba(255,255,255,0.15); padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; color: #e0e0e0;}
    
    .modal-summary-section { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; margin-bottom: 15px; }
    .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .translate-btn { background: #4285F4; color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: var(--transition);}
    .translate-btn:hover { background: #3367d6; }
    .summary-text { font-size: 0.85rem; color: #ccc; line-height: 1.5; padding-right: 5px; }

    .modal-action { margin-top: 10px; }
    .modal-anilist-button { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--primary); color: #000; padding: 12px; border-radius: 8px; font-weight: 700; text-decoration: none; transition: var(--transition); font-size: 0.95rem;}
    .modal-anilist-button:hover { background: #fff; transform: scale(1.02); }
    
    footer { text-align: center; padding: 20px; font-size: 0.8rem; color: var(--text-muted); margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05); }
    footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/61/AniList_logo.svg" alt="AniList">
        <h1 id="ui-header-title">Anime Takvimi</h1>
    </div>
    <div class="lang-switcher" id="langSwitcher">
        <div class="lang-btn" data-lang="tr">TR</div>
        <div class="lang-btn" data-lang="en">EN</div>
    </div>
  </header>

  <div class="filter-scroll-container">
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Anime ara (Örn: DanMachi)...">
    </div>
    <div class="genre-pills" id="genrePillsContainer"></div>
  </div>

  <main>
    <div class="hero-slider-container" id="heroSliderContainer">
        <div class="hero-slider" id="heroSlider"></div>
        <div class="slider-dots" id="sliderDots"></div>
    </div>

    <div id="loadingContainer" class="loader-container">
        <div class="spinner"></div>
        <p id="ui-loading-text">Bölümler taranıyor...</p>
    </div>
    
    <div id="animeList"></div>
  </main>

  <div id="infoModal" class="modal"> 
    <div class="modal-content"> 
        <span class="close">&times;</span> 
        <img id="modalBanner" class="modal-banner" src="" alt="Banner">
        <div class="modal-body">
            <h3 id="modalTitle"></h3>
            
            <div class="modal-details">
                <div class="detail-item"><span class="detail-label" id="ui-modal-start-date">Başlangıç</span><span class="detail-value" id="modalStartDate"></span></div>
                <div class="detail-item"><span class="detail-label" id="ui-modal-studio">Stüdyo</span><span class="detail-value" id="modalStudio"></span></div>
                <div class="detail-item"><span class="detail-label" id="ui-modal-score">Puan</span><span class="detail-value" id="modalScore"></span></div>
                <div class="detail-item" style="grid-column: 1 / -1;">
                    <span class="detail-label" id="ui-modal-platforms">Platformlar</span>
                    <div class="platforms-container" id="modalPlatforms"></div>
                </div>
                <div class="detail-item" style="grid-column: 1 / -1;">
                    <span class="detail-label" id="ui-modal-genres">Türler</span>
                    <span class="detail-value" id="modalGenres"></span>
                </div>
            </div>
            
            <div class="modal-tags" id="modalTags"></div>

            <div class="modal-summary-section">
                <div class="summary-header">
                    <span class="detail-label" style="color: var(--primary); font-weight: 600;" id="ui-modal-summary">Konu Özeti</span>
                    <!-- "target=_blank" özelliği anlık çeviri yapacağımız için kaldırıldı -->
                    <a id="modalTranslateBtn" href="#" class="translate-btn">
                        <i class="fa-brands fa-google"></i> <span id="ui-btn-translate">Çevir</span>
                    </a>
                </div>
                <div class="summary-text" id="modalSummary"></div>
            </div>

            <div class="modal-action">
                <a id="modalLink" href="#" target="_blank" class="modal-anilist-button">
                    <span id="ui-btn-anilist">AniList Sayfasına Git</span> <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </div> 
  </div>

  <footer> 
    <p><a href="https://kerimdemirkaynak.github.io/">Ana Sayfa</a> | &copy; 2026 Kerim Demirkaynak</p> 
  </footer>

  <script>
  const i18n = {
      tr: {
          headerTitle: "Anime Takvimi", searchPlaceholder: "Anime ara (Örn: DanMachi, SAO)...",
          all: "🔥 Tümü", myList: "Listem", loading: "Bölümler taranıyor...", noResults: "Kriterlere uygun anime bulunamadı.",
          seasonHit: "Sezonun Gözdesi", out: "Çıktı", ago: "önce", days: "g", hours: "s", mins: "d", ep: "BLM",
          startDate: "Başlangıç", studio: "Stüdyo", score: "Puan", platforms: "Platformlar", genres: "Türler",
          summaryTitle: "Konu Özeti", translateBtn: "Çevir", originalBtn: "Orijinali Göster", anilistBtn: "AniList Sayfasına Git",
          unknown: "Bilinmiyor", none: "Yok", unlisted: "Belirtilmemiş", error: "Hata", jsonError: "Çeviri dosyası yüklenemedi!"
      },
      en: {
          headerTitle: "Anime Calendar", searchPlaceholder: "Search anime (e.g. DanMachi, SAO)...",
          all: "🔥 All", myList: "My List", loading: "Scanning episodes...", noResults: "No anime found matching criteria.",
          seasonHit: "Season Hit", out: "Released", ago: "ago", days: "d", hours: "h", mins: "m", ep: "EP",
          startDate: "Start Date", studio: "Studio", score: "Score", platforms: "Platforms", genres: "Genres",
          summaryTitle: "Synopsis", translateBtn: "Translate", originalBtn: "Show Original", anilistBtn: "Go to AniList",
          unknown: "Unknown", none: "N/A", unlisted: "Unlisted", error: "Error", jsonError: "Failed to load translation file!"
      }
  };

  let currentLang = navigator.language.startsWith('tr') ? 'tr' : 'en';
  let genreTranslations = {};
  let tagTranslations = {};

  const platformLogos = { 
      "Crunchyroll": "https://upload.wikimedia.org/wikipedia/commons/d/d9/Crunchyroll_2024.svg", 
      "HIDIVE": "https://upload.wikimedia.org/wikipedia/commons/5/5f/Hidive_text_logo.svg", 
      "YouTube": "https://upload.wikimedia.org/wikipedia/commons/0/08/YouTube_light_logo_%282024%29.svg", 
      "Bilibili TV": "https://upload.wikimedia.org/wikipedia/en/b/b7/Bilibili_logo.svg", 
      "Netflix": "https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg",
      "Hulu": "https://upload.wikimedia.org/wikipedia/commons/e/e4/Hulu_Logo.svg",
      "Amazon Prime Video": "https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png"
  };

  function translateGenre(g) { return currentLang === 'tr' ? (genreTranslations[g] || g) : g; }
  function translateTag(t) { return currentLang === 'tr' ? (tagTranslations[t] || t) : t; }

  function getAnimeTitle(anime) {
      if (currentLang === 'en' && anime.title.english) return anime.title.english;
      return anime.title.romaji;
  }

  let allAnimes = [];
  let selectedGenres = [];
  let isMyListActive = false;
  let searchTerm = "";
  let currentSlide = 0;
  let slideInterval;

  const animeListContainer = document.getElementById('animeList');
  const loadingContainer = document.getElementById('loadingContainer');
  const genrePillsContainer = document.getElementById('genrePillsContainer');
  const searchInput = document.getElementById('searchInput');

  async function loadTranslations() {
      try {
          const response = await fetch('https://raw.githubusercontent.com/KerimDemirkaynak/AnimeTakvimi/refs/heads/main/turtemaceviri.json');
          if (!response.ok) throw new Error("JSON Fetch Error");
          const data = await response.json();
          if (data.tur) data.tur.forEach(item => { genreTranslations[item.orijinal] = item.ceviri; });
          if (data.tema) data.tema.forEach(item => { tagTranslations[item.orijinal] = item.ceviri; });
      } catch (error) {
          console.warn(i18n[currentLang].jsonError, error);
      }
  }

  function updateStaticUI() {
      const t = i18n[currentLang];
      document.getElementById('ui-header-title').textContent = t.headerTitle;
      document.getElementById('searchInput').placeholder = t.searchPlaceholder;
      document.getElementById('ui-loading-text').textContent = t.loading;
      document.getElementById('ui-modal-start-date').textContent = t.startDate;
      document.getElementById('ui-modal-studio').textContent = t.studio;
      document.getElementById('ui-modal-score').textContent = t.score;
      document.getElementById('ui-modal-platforms').textContent = t.platforms;
      document.getElementById('ui-modal-genres').textContent = t.genres;
      document.getElementById('ui-modal-summary').textContent = t.summaryTitle;
      document.getElementById('ui-btn-translate').textContent = t.translateBtn;
      document.getElementById('ui-btn-anilist').textContent = t.anilistBtn;
      document.querySelectorAll('.lang-btn').forEach(btn => {
          btn.classList.toggle('active', btn.getAttribute('data-lang') === currentLang);
      });
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
          currentLang = e.target.getAttribute('data-lang');
          updateStaticUI();
          if (allAnimes.length > 0) {
              setupFilters(allAnimes); 
              applyFilters(); 
              initSlider(allAnimes); 
          }
      });
  });

  function initSlider(rawData) {
      const sliderAnimes = rawData.filter(a => !a.isAdult && a.bannerImage).slice(0, 5);
      const sliderContainer = document.getElementById('heroSliderContainer');
      const sliderTrack = document.getElementById('heroSlider');
      const dotsContainer = document.getElementById('sliderDots');
      if(sliderAnimes.length === 0 || searchTerm !== "" || selectedGenres.length > 0 || isMyListActive) {
          sliderContainer.style.display = 'none';
          return;
      }
      sliderContainer.style.display = 'block';
      sliderTrack.innerHTML = '';
      dotsContainer.innerHTML = '';
      sliderAnimes.forEach((anime, index) => {
          const slide = document.createElement('div');
          slide.className = 'slide';
          slide.onclick = () => showInfo(anime);
          slide.innerHTML = `
              <img src="${anime.bannerImage}" alt="Banner" loading="lazy">
              <div class="slide-overlay">
                  <div class="slide-badge"><i class="fa-solid fa-fire"></i> ${i18n[currentLang].seasonHit}</div>
                  <div class="slide-title">${getAnimeTitle(anime)}</div>
              </div>
          `;
          sliderTrack.appendChild(slide);
          const dot = document.createElement('div');
          dot.className = `dot ${index === 0 ? 'active' : ''}`;
          dot.onclick = () => goToSlide(index);
          dotsContainer.appendChild(dot);
      });
      startSlideTimer(sliderAnimes.length);
  }

  function goToSlide(index) {
      const sliderTrack = document.getElementById('heroSlider');
      const dots = document.querySelectorAll('.dot');
      currentSlide = index;
      sliderTrack.style.transform = `translateX(-${index * 100}%)`;
      dots.forEach(d => d.classList.remove('active'));
      if(dots[index]) dots[index].classList.add('active');
  }

  function startSlideTimer(totalSlides) {
      clearInterval(slideInterval);
      slideInterval = setInterval(() => {
          currentSlide = (currentSlide + 1) % totalSlides;
          goToSlide(currentSlide);
      }, 4000); 
  }

  function renderAnimeCards(animesToDisplay) {
    animeListContainer.innerHTML = '';
    const t = i18n[currentLang];
    if (animesToDisplay.length === 0) {
      animeListContainer.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#666;"><i class="fa-regular fa-face-frown" style="font-size:2.5rem; margin-bottom:10px; display:block;"></i>${t.noResults}</div>`;
      return;
    }
    const now = Math.floor(Date.now() / 1000);
    animesToDisplay.forEach(anime => {
      const ep = anime.nextAiringEpisode;
      const diff = ep.airingAt - now;
      const absDiff = Math.abs(diff);
      const d = Math.floor(absDiff / 86400);
      const h = Math.floor((absDiff % 86400) / 3600);
      const m = Math.floor((absDiff % 3600) / 60);
      let timeStr = `${d > 0 ? d + t.days + ' ' : ''}${h > 0 ? h + t.hours + ' ' : ''}${m}${t.mins}`;
      let airingText = diff > 0 
          ? `<i class="fa-regular fa-clock"></i> ${timeStr}` 
          : `<i class="fa-solid fa-check-double" style="color:#2ecc71"></i> ${timeStr} ${t.ago}`;
      const card = document.createElement('div');
      card.className = 'anime-card';
      card.innerHTML = `
          <div class="episode-badge">${t.ep} ${ep.episode}</div>
          <img class="poster" src="${anime.coverImage.large}" alt="Poster" loading="lazy">
          <div class="card-overlay">
            <div class="anime-title" title="${getAnimeTitle(anime)}">${getAnimeTitle(anime)}</div>
            <div class="airing-time">${airingText}</div>
          </div>`;
      card.onclick = () => showInfo(anime);
      animeListContainer.appendChild(card);
    });
  }

  function applyFilters() {
      let filtered = allAnimes;
      
      if (isMyListActive) {
          filtered = filtered.filter(a => a.isMyList === true);
      }

      if (searchTerm) {
          const lowerTerm = searchTerm.toLowerCase();
          filtered = filtered.filter(a => {
              const romajiMatch = a.title.romaji?.toLowerCase().includes(lowerTerm);
              const enMatch = a.title.english?.toLowerCase().includes(lowerTerm);
              const synMatch = a.synonyms?.some(s => s.toLowerCase().includes(lowerTerm));
              return romajiMatch || enMatch || synMatch;
          });
      }
      
      if (selectedGenres.length > 0) {
          filtered = filtered.filter(a => selectedGenres.every(g => a.genres.includes(g)));
      }
      
      if(searchTerm || selectedGenres.length > 0 || isMyListActive) {
          document.getElementById('heroSliderContainer').style.display = 'none';
      } else {
          document.getElementById('heroSliderContainer').style.display = 'block';
      }
      renderAnimeCards(filtered);
  }

  searchInput.addEventListener('input', (e) => {
      searchTerm = e.target.value.trim();
      applyFilters();
  });

  function setupFilters(animes) {
    const genres = new Set();
    animes.forEach(a => a.genres.forEach(g => genres.add(g)));
    
    genrePillsContainer.innerHTML = `
      <button class="pill-btn ${selectedGenres.length === 0 && !isMyListActive ? 'active' : ''}" data-genre="All">${i18n[currentLang].all}</button>
      <button class="pill-btn ${isMyListActive ? 'active' : ''}" data-genre="MyList" style="border-color:#f1c40f;">✨ ${i18n[currentLang].myList}</button>
    `;

    Array.from(genres).sort().forEach(genre => {
      const isActive = selectedGenres.includes(genre) ? 'active' : '';
      genrePillsContainer.innerHTML += `<button class="pill-btn ${isActive}" data-genre="${genre}">${translateGenre(genre)}</button>`;
    });

    document.querySelectorAll('.pill-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const clickedGenre = e.target.getAttribute('data-genre');
        const allBtn = document.querySelector('.pill-btn[data-genre="All"]');
        const myListBtn = document.querySelector('.pill-btn[data-genre="MyList"]');

        if (clickedGenre === "All") {
            selectedGenres = [];
            isMyListActive = false;
            document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
        } else if (clickedGenre === "MyList") {
            selectedGenres = []; 
            isMyListActive = !isMyListActive; 
            document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
            if(isMyListActive) e.target.classList.add('active');
            else allBtn.classList.add('active');
        } else {
            allBtn.classList.remove('active');
            myListBtn.classList.remove('active');
            isMyListActive = false;
            
            if (selectedGenres.includes(clickedGenre)) {
                selectedGenres = selectedGenres.filter(g => g !== clickedGenre);
                e.target.classList.remove('active');
            } else {
                selectedGenres.push(clickedGenre);
                e.target.classList.add('active');
            }
            if (selectedGenres.length === 0) allBtn.classList.add('active');
        }
        applyFilters();
      });
    });
  }

  async function fetchAnimeData() {
    updateStaticUI();
    try {
      const response = await fetch('./anime-data.json');
      if (!response.ok) throw new Error("Veri dosyası bulunamadı.");
      const data = await response.json();
      if (!data.data?.Page?.media) throw new Error("Geçersiz veri.");
      const rawData = data.data.Page.media;
      const now = Math.floor(Date.now() / 1000);
      const limit = 7 * 24 * 60 * 60;
      allAnimes = rawData.filter(a => {
          if (a.isAdult || !a.nextAiringEpisode?.airingAt) return false;
          return Math.abs(a.nextAiringEpisode.airingAt - now) <= limit;
      }).sort((a, b) => {
          return Math.abs(a.nextAiringEpisode.airingAt - now) - Math.abs(b.nextAiringEpisode.airingAt - now);
      });
      loadingContainer.style.display = 'none';
      initSlider(allAnimes); 
      setupFilters(allAnimes);
      renderAnimeCards(allAnimes);
    } catch (error) {
      loadingContainer.innerHTML = `<p style="color:var(--danger);">${i18n[currentLang].error}: ${error.message}</p>`;
    }
  }

  const modal = document.getElementById('infoModal');

  function showInfo(anime) {
    const t = i18n[currentLang];
    document.getElementById('modalBanner').src = anime.bannerImage || anime.coverImage.extraLarge || anime.coverImage.large;
    document.getElementById('modalTitle').textContent = getAnimeTitle(anime);
    
    const monthNames = {
        tr: ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"],
        en: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]
    };

    let startDateText = t.unknown;
    if (anime.startDate && anime.startDate.year) {
        const y = anime.startDate.year;
        const mIndex = anime.startDate.month ? anime.startDate.month - 1 : null;
        const d = anime.startDate.day ? anime.startDate.day : null;
        if (d && mIndex !== null) {
            startDateText = currentLang === 'tr' ? `${d} ${monthNames.tr[mIndex]} ${y}` : `${monthNames.en[mIndex]} ${d}, ${y}`;
        } else if (mIndex !== null) {
            startDateText = `${monthNames[currentLang][mIndex]} ${y}`;
        } else {
            startDateText = `${y}`;
        }
    }
    document.getElementById('modalStartDate').textContent = startDateText;

    document.getElementById('modalStudio').textContent = anime.studios.nodes.length ? anime.studios.nodes[0].name : t.unknown;
    document.getElementById('modalScore').innerHTML = anime.averageScore ? `${(anime.averageScore/10).toFixed(1)} <i class="fa-solid fa-star" style="color:#f1c40f"></i>` : t.none;
    document.getElementById('modalGenres').textContent = anime.genres.map(translateGenre).join(', ') || '-';
    
    let platformsHTML = '';
    anime.externalLinks.forEach(link => {
        if (platformLogos[link.site]) {
            platformsHTML += `<a href="${link.url}" target="_blank" title="${link.site}"><img src="${platformLogos[link.site]}" alt="${link.site}"></a>`;
        }
    });
    document.getElementById('modalPlatforms').innerHTML = platformsHTML || `<span style="font-size: 0.8rem; color:#aaa;">${t.unlisted}</span>`;

    const validTags = anime.tags.filter(tag => !tag.isMediaSpoiler).slice(0, 4);
    document.getElementById('modalTags').innerHTML = validTags.map(tag => `<span class="tag">${translateTag(tag.name)}</span>`).join('');
    
    let descHtml = anime.description || "";
    document.getElementById('modalSummary').innerHTML = descHtml || `<span style="color:#777;">${t.unknown}</span>`;
    
    const translateBtn = document.getElementById('modalTranslateBtn');
    
    if (anime.description) {
        translateBtn.style.display = 'inline-flex';
        let isTranslated = false;
        document.getElementById('ui-btn-translate').textContent = t.translateBtn;
        
        translateBtn.onclick = (e) => {
            e.preventDefault();
            isTranslated = !isTranslated;
            
            if (isTranslated && anime.descriptionTr) {
                document.getElementById('modalSummary').innerHTML = anime.descriptionTr;
                document.getElementById('ui-btn-translate').textContent = t.originalBtn;
            } else {
                document.getElementById('modalSummary').innerHTML = descHtml;
                document.getElementById('ui-btn-translate').textContent = t.translateBtn;
            }
        };
    } else {
        translateBtn.style.display = 'none';
    }

    document.getElementById('modalLink').href = `https://anilist.co/anime/${anime.id}`;
    document.querySelector('.modal-body').scrollTop = 0;
    modal.style.display = 'block';
    modal.classList.remove('fade-out');
  }

  function closeModal() {
    modal.classList.add('fade-out');
    setTimeout(() => { if (modal.classList.contains('fade-out')) modal.style.display = 'none'; }, 200);
  }

  document.querySelector('.close').onclick = closeModal;
  window.onclick = (e) => { if (e.target == modal) closeModal(); };

  async function initApp() {
      updateStaticUI();
      await loadTranslations();
      fetchAnimeData();
  }
  initApp();
  </script>
</body>
</html>
